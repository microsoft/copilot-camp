            - Work IQ:
              - Introduction : 'pages/work-iq/index.md'
            - Agent 365:
              - Introduction : 'pages/agent-365/index.md'
            - Beyond Labs - AI concepts:
              - Blogs : 'pages/beyond-labs/index.md'
